<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Unity Boot Cube — GameCube-style homage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --mint:#00ff85; --ink:#0d0d20; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:
      radial-gradient(120% 90% at 50% 8%, #16163a 0%, #0d0d20 52%, #08081a 100%);
    color:#fff; font-family:'Outfit',sans-serif; overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  /* faint mint floor glow */
  body::after{
    content:""; position:fixed; left:50%; bottom:-12%; width:80vw; height:50vh;
    transform:translateX(-50%);
    background:radial-gradient(ellipse at center, rgba(0,255,133,.12), transparent 65%);
    filter:blur(20px); pointer-events:none; z-index:0;
  }
  #scene{ position:fixed; inset:0; z-index:1; display:block; touch-action:none; cursor:grab; }
  #scene.dragging{ cursor:grabbing; }

  .ui{ position:fixed; z-index:3; pointer-events:none; }

  /* top-left brand */
  .brand{ top:24px; left:26px; display:flex; flex-direction:column; gap:9px; }
  .brand .back{ pointer-events:auto; display:inline-flex; align-items:center; gap:8px; align-self:flex-start;
    font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.06em; color:#cfcfe6;
    background:rgba(20,20,46,.55); border:1px solid rgba(255,255,255,.16); backdrop-filter:blur(10px);
    padding:9px 15px; border-radius:999px; text-decoration:none; margin-bottom:3px;
    transition:border-color .18s, color .18s, background .18s; }
  .brand .back:hover{ border-color:rgba(0,255,133,.6); color:#fff; background:rgba(0,255,133,.1); }
  .brand .back span{ font-size:14px; line-height:1; transition:transform .18s; }
  .brand .back:hover span{ transform:translateX(-3px); }
  .brand .row{ display:flex; align-items:center; gap:11px; font-family:'Outfit',sans-serif; font-weight:700; font-size:16px; letter-spacing:.01em; }
  .brand .dot{ width:9px; height:9px; border-radius:2px; background:var(--mint); box-shadow:0 0 12px var(--mint); }
  .brand .tag{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.16em; color:#7a7aa6; padding-left:1px; }

  /* center wordmark (revealed after boot) */
  .mark{ left:0; right:0; bottom:124px; text-align:center; opacity:0; transform:translateY(14px); }
  .mark h1{ font-family:'Outfit',sans-serif; font-weight:600; font-size:clamp(44px,9vw,92px);
    letter-spacing:-.03em; line-height:.9; }
  .mark .sub{ margin-top:14px; font-family:'Space Mono',monospace; font-size:12.5px; letter-spacing:.18em;
    color:#9a9abc; text-transform:uppercase; }

  /* bottom controls */
  .controls{ left:0; right:0; bottom:26px; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;
    pointer-events:none; padding:0 16px; }
  .btn{ pointer-events:auto; display:inline-flex; align-items:center; gap:9px; cursor:pointer;
    font-family:'Space Mono',monospace; font-size:13px; letter-spacing:.02em; color:#cfcfe6;
    background:rgba(20,20,46,.6); border:1px solid rgba(255,255,255,.14); backdrop-filter:blur(10px);
    padding:11px 17px; border-radius:999px; transition:border-color .18s, color .18s, background .18s; }
  .btn:hover{ border-color:rgba(0,255,133,.55); color:#fff; }
  .btn .ic{ font-size:14px; line-height:1; }
  .btn.primary{ background:var(--mint); color:#0d0d20; border-color:var(--mint); font-weight:700; }
  .btn.primary:hover{ color:#0d0d20; filter:brightness(1.05); }
  .btn[aria-pressed="true"]{ border-color:var(--mint); color:var(--mint); }

  /* drag hint */
  .hint{ left:0; right:0; bottom:88px; text-align:center; font-family:'Space Mono',monospace;
    font-size:11.5px; letter-spacing:.14em; color:#5f5f86; text-transform:uppercase; opacity:0; }

  /* loading */
  #load{ position:fixed; inset:0; z-index:5; display:flex; align-items:center; justify-content:center;
    background:#0d0d20; font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.2em;
    color:#6b6b8f; transition:opacity .5s ease; }
  #load.hide{ opacity:0; pointer-events:none; }

  @media (max-width:640px){
    .brand{ top:18px; left:18px; }
    .mark{ bottom:120px; }
  }
  @media (prefers-reduced-motion:reduce){
    .mark, .hint{ transition:none; }
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="load">INITIALISING&nbsp;·&nbsp;UNITY&nbsp;BOOT</div>

  <div class="ui brand">
    <a class="back" href="index.html" title="Back to portfolio"><span aria-hidden="true">←</span> Back to portfolio</a>
    <div class="row"><span class="dot"></span> Valentin Luzolo</div>
    <div class="tag">UNITY BOOT // GAMECUBE HOMAGE</div>
  </div>

  <div class="ui mark" id="mark">
    <h1>Unity</h1>
    <div class="sub">Drag to explore</div>
  </div>

  <div class="ui hint" id="hint">drag to rotate · scroll to zoom</div>

  <div class="ui controls">
    <button class="btn primary" id="replay"><span class="ic">⟳</span> Replay boot</button>
    <button class="btn" id="auto" aria-pressed="true"><span class="ic">⤬</span> Auto-rotate</button>
    <button class="btn" id="sound" aria-pressed="false"><span class="ic">♪</span> Sound</button>
  </div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ───────────────────────── constants & helpers ─────────────────────────
const MINT = 0x00ff85;
const FOG  = 0x0d0d20;

const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const lerp  = (a, b, t) => a + (b - a) * t;
const easeOutCubic  = t => 1 - Math.pow(1 - t, 3);
const easeInOutCubic= t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
const easeOutBack   = (t, s=1.70158) => 1 + (s+1)*Math.pow(t-1,3) + s*Math.pow(t-1,2);
const easeOutSine   = t => Math.sin(t * Math.PI/2);
const phase = (t, a, b) => clamp((t - a) / (b - a), 0, 1);

// ───────────────────────── renderer / scene / camera ───────────────────
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true, preserveDrawingBuffer:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(FOG, 11, 26);

const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 100);
const CAM_BASE = new THREE.Vector3(0, 2.75, 9.0);
const CAM_TARGET = new THREE.Vector3(0, 1.7, 0);
let camZoom = 1;
camera.position.copy(CAM_BASE);
camera.lookAt(CAM_TARGET);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// ───────────────────────── lights ──────────────────────────────────────
scene.add(new THREE.HemisphereLight(0xc3d2ff, 0x05050f, 0.22));

const key = new THREE.DirectionalLight(0xffffff, 3.4);
key.position.set(2.0, 9, 4.0);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 1; key.shadow.camera.far = 32;
key.shadow.camera.left = -7; key.shadow.camera.right = 7;
key.shadow.camera.top = 7;  key.shadow.camera.bottom = -7;
key.shadow.bias = -0.0004; key.shadow.normalBias = 0.025;
scene.add(key);

const rim = new THREE.DirectionalLight(0xcfe8ff, 0.35);
rim.position.set(-6, 3.5, -5);
scene.add(rim);

const fill = new THREE.PointLight(0x8f9bdf, 4, 40, 2);
fill.position.set(-3.5, 2.2, 6);
scene.add(fill);

const spark = new THREE.PointLight(MINT, 2.2, 20, 2);
scene.add(spark);

// ───────────────────────── floor: shadow + grid ────────────────────────
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.ShadowMaterial({ opacity: 0.4 })
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

const grid = new THREE.GridHelper(80, 80, MINT, 0x21294a);
grid.material.transparent = true;
grid.material.opacity = 0.13;
grid.position.y = 0.001;
scene.add(grid);

// ───────────────────────── the Unity cube logo ─────────────────────────
// The real Unity mark is a HOLLOW cube: each face is a square panel with a
// hooked notch cut clean through it. Assembled, you see through the body and
// the three visible faces pinwheel into the iconic icon. We build it from
// six extruded face-panels so it is genuinely 3D and see-through.
const SIDE = 2.0, HALF = SIDE/2;

const bodyMat = new THREE.MeshStandardMaterial({
  color: 0xd7dbe3, roughness: 0.62, metalness: 0.0,
  envMapIntensity: 0.45,
});

const logo = new THREE.Group();
logo.rotation.order = 'YXZ';
scene.add(logo);

// The Unity mark is a cube drawn as its 12 EDGES (thick square bars), so each
// face reads as a frame with a square hole — and at 3 corners (a 3-fold set)
// the bars are pulled back so the edges don't touch, leaving the signature
// gaps. No solid faces, no tongues — just disconnected edges.
const BAR = 0.46;          // bar cross-section
const GAP = 0.34;          // how far bars retract from a "gapped" corner

const VERTS = [];
for (const sx of [-1,1]) for (const sy of [-1,1]) for (const sz of [-1,1]) VERTS.push([sx,sy,sz]);
const vkey = v => v.join(',');

// the three corners whose edges are pulled apart (3-fold symmetric about the
// main diagonal through the front + back corners)
const GAP_SET = new Set(['1,-1,-1', '-1,1,-1', '-1,-1,1']);

// all 12 edges = vertex pairs differing in exactly one coordinate
const EDGES = [];
for (let i=0;i<VERTS.length;i++) for (let j=i+1;j<VERTS.length;j++){
  const a=VERTS[i], b=VERTS[j];
  if ((a[0]!==b[0]) + (a[1]!==b[1]) + (a[2]!==b[2]) === 1) EDGES.push([a,b]);
}

for (const [a,b] of EDGES){
  const axis = a[0]!==b[0] ? 0 : a[1]!==b[1] ? 1 : 2;
  const pA = a.map(s=>s*HALF), pB = b.map(s=>s*HALF);
  const dir = pB[axis] > pA[axis] ? 1 : -1;
  const start = pA[axis] + dir*(GAP_SET.has(vkey(a)) ? GAP : 0);
  const end   = pB[axis] - dir*(GAP_SET.has(vkey(b)) ? GAP : 0);
  const len = Math.abs(end - start);
  if (len <= 0.02) continue;
  const geo = new THREE.BoxGeometry(
    axis===0?len:BAR, axis===1?len:BAR, axis===2?len:BAR
  );
  const m = new THREE.Mesh(geo, bodyMat);
  m.position.set(
    axis===0?(start+end)/2:pA[0],
    axis===1?(start+end)/2:pA[1],
    axis===2?(start+end)/2:pA[2]
  );
  m.castShadow = true; m.receiveShadow = true;
  logo.add(m);
}

// orientation helpers — the settled pose looks straight down the cube's main
// diagonal so the three corner gaps sit symmetrically (regular-hexagon view)
const Yx = new THREE.Vector3(0,1,0), Xx = new THREE.Vector3(1,0,0);
const IDENTITY = new THREE.Quaternion();
let BASE_Q = new THREE.Quaternion();    // computed once HERO_Y is known
function frameQuat(fwd, up){
  const f = fwd.clone().normalize();
  const r = new THREE.Vector3().crossVectors(up, f).normalize();
  const u = new THREE.Vector3().crossVectors(f, r);
  return new THREE.Quaternion().setFromRotationMatrix(new THREE.Matrix4().makeBasis(r, u, f));
}
function applyQuat(y, p){
  const q = new THREE.Quaternion().setFromAxisAngle(Yx, y);
  q.multiply(new THREE.Quaternion().setFromAxisAngle(Xx, p));
  q.multiply(BASE_Q);
  logo.quaternion.copy(q);
}

// ───────────────────────── boot timeline ───────────────────────────────
const T = { p0:0.30, roll:1.95, build:2.95, spin:4.30, settle:5.05 };
const ROLL_N = 5;
const ROLL_SCALE = 0.5;
const hEff = HALF * ROLL_SCALE;
const SEFF = SIDE * ROLL_SCALE;
const ROLL_START_X = -ROLL_N * SEFF;
const HERO_Y = 2.35;
const HERO_SCALE = 0.82;
{
  const viewDir = new THREE.Vector3().subVectors(camera.position, new THREE.Vector3(0, HERO_Y, 0)).normalize();
  // map cube diagonal (1,1,1) toward the camera, and a gapped corner straight up
  const qSrc = frameQuat(new THREE.Vector3(1,1,1), new THREE.Vector3(-1,-1,1));
  const qTgt = frameQuat(viewDir, new THREE.Vector3(0,1,0));
  BASE_Q.copy(qTgt).multiply(qSrc.invert());
  // roll in the view plane so a corner (not an edge) sits at the apex
  BASE_Q.premultiply(new THREE.Quaternion().setFromAxisAngle(viewDir, Math.PI/6));
}

let bootT = 0, bootDone = false, soundReady = false;
let uiTarget = 0, uiAlpha = 0;

let yaw = 0, pitch = 0;
let userYaw = 0, userPitch = 0;
let velYaw = 0;
let dragging = false, lastPX = 0, lastPY = 0, lastMoveT = 0;
let autoRotate = false, idleClock = 0;
const AUTO_SPEED = 0.32;

function resetBoot(){
  bootT = 0; bootDone = false;
  logo.scale.setScalar(ROLL_SCALE);
  uiTarget = 0; uiAlpha = 0; applyUI();
  updateBoot._chimed = false;
  if (soundReady) chime(false);
}

function applyUI(){
  mark.style.opacity = uiAlpha;
  mark.style.transform = `translateY(${(1 - uiAlpha) * 14}px)`;
  hint.style.opacity = Math.max(0, uiAlpha);
}

function applyRoll(p){
  const rollPos = easeOutSine(p) * ROLL_N;
  const k = Math.min(Math.floor(rollPos), ROLL_N - 1);
  const fp = rollPos - k;
  const a = -Math.PI/2 * fp;
  const xk = ROLL_START_X + k * SEFF;
  const pivotX = xk + hEff;
  const relX = -hEff, relY = hEff;
  const ca = Math.cos(a), sa = Math.sin(a);
  logo.position.x = pivotX + (relX*ca - relY*sa);
  logo.position.y = (relX*sa + relY*ca);
  logo.position.z = 0;
  logo.scale.setScalar(ROLL_SCALE);
  logo.rotation.set(0, 0, -k*Math.PI/2 + a);
  if (k !== applyRoll._k){ applyRoll._k = k; if (k > 0) tick(260 + k*55); }
}
applyRoll._k = -1;

function updateBoot(dt){
  bootT += dt;
  const t = bootT;

  if (t < T.p0){ applyRoll(0); return; }
  if (t < T.roll){ applyRoll(phase(t, T.p0, T.roll)); return; }

  if (t < T.build){
    // spring up: grow, rise to hero height, unroll
    const u = phase(t, T.roll, T.build);
    const s = lerp(ROLL_SCALE, HERO_SCALE, easeOutBack(u));
    logo.scale.setScalar(s);
    logo.position.set(0, lerp(hEff, HERO_Y, easeOutCubic(u)) + Math.sin(u*Math.PI)*0.18, 0);
    logo.rotation.set(0, 0, lerp(-ROLL_N*Math.PI/2, 0, easeInOutCubic(u)));
    if (u > 0.5 && !updateBoot._chimed){ updateBoot._chimed = true; chime(true); }
    return;
  }

  if (t < T.spin){
    // hero reveal: a full revolution about Y that slerps into the logo pose
    const u = phase(t, T.build, T.spin);
    const e = easeOutCubic(u);
    logo.scale.setScalar(HERO_SCALE);
    logo.position.set(0, HERO_Y, 0);
    const q = new THREE.Quaternion().slerpQuaternions(IDENTITY, BASE_Q, e);
    q.premultiply(new THREE.Quaternion().setFromAxisAngle(Yx, (1 - e) * Math.PI * 2));
    logo.quaternion.copy(q);
    return;
  }

  // settle: reveal wordmark, then hand off to interaction
  if (uiTarget === 0){ uiTarget = 1; }
  logo.scale.setScalar(HERO_SCALE);
  logo.position.set(0, HERO_Y, 0);
  yaw = 0; pitch = 0;
  applyQuat(0, 0);

  if (t >= T.settle && !bootDone){
    bootDone = true;
    userYaw = 0; userPitch = 0; velYaw = 0;
  }
}

function updateInteractive(dt){
  idleClock += dt;
  if (!dragging){
    userYaw += velYaw;
    velYaw *= 0.94;
    if (autoRotate && Math.abs(velYaw) < 0.0008) userYaw += AUTO_SPEED * dt;
    userPitch += (0 - userPitch) * 0.03;
  }
  yaw   += (userYaw   - yaw)   * 0.16;
  pitch += (userPitch - pitch) * 0.16;

  const bob = Math.sin(idleClock * 1.1) * 0.05;
  logo.position.set(0, HERO_Y + bob, 0);
  applyQuat(yaw, pitch);
  logo.scale.setScalar(HERO_SCALE);
}

// ───────────────────────── pointer / wheel interaction ─────────────────
canvas.addEventListener('pointerdown', e => {
  resumeAudio();
  if (!bootDone) return;
  dragging = true; canvas.classList.add('dragging');
  canvas.setPointerCapture(e.pointerId);
  lastPX = e.clientX; lastPY = e.clientY; lastMoveT = performance.now();
  velYaw = 0;
});
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastPX, dy = e.clientY - lastPY;
  userYaw   += dx * 0.011;
  userPitch  = clamp(userPitch - dy * 0.011, -1.2, 1.2);
  const now = performance.now(), dt = Math.max(16, now - lastMoveT);
  velYaw = (dx * 0.011) * (16 / dt);
  lastPX = e.clientX; lastPY = e.clientY; lastMoveT = now;
});
function endDrag(e){
  if (!dragging) return;
  dragging = false; canvas.classList.remove('dragging');
  try { canvas.releasePointerCapture(e.pointerId); } catch(_){}
}
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camZoom = clamp(camZoom + Math.sign(e.deltaY) * 0.08, 0.62, 1.7);
}, { passive:false });

// ───────────────────────── controls ────────────────────────────────────
const mark   = document.getElementById('mark');
const hint   = document.getElementById('hint');
const replay = document.getElementById('replay');
const autoBtn= document.getElementById('auto');
const soundBtn=document.getElementById('sound');

replay.addEventListener('click', () => { resumeAudio(); resetBoot(); });
autoBtn.addEventListener('click', () => {
  autoRotate = !autoRotate;
  autoBtn.setAttribute('aria-pressed', String(autoRotate));
});

// ───────────────────────── tiny WebAudio (optional) ────────────────────
let actx = null, soundOn = false;
function resumeAudio(){ if (actx && actx.state === 'suspended') actx.resume(); }
soundBtn.addEventListener('click', () => {
  if (!actx){ actx = new (window.AudioContext || window.webkitAudioContext)(); soundReady = true; }
  resumeAudio();
  soundOn = !soundOn;
  soundBtn.setAttribute('aria-pressed', String(soundOn));
});
function tick(freq){
  if (!soundOn || !actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'triangle'; o.frequency.value = freq;
  o.connect(g).connect(actx.destination);
  const t = actx.currentTime;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.11, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.11);
  o.start(t); o.stop(t + 0.12);
}
function chime(up){
  if (!soundOn || !actx) return;
  const notes = up ? [523, 659, 784, 1046] : [392];
  notes.forEach((f, i) => {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    o.connect(g).connect(actx.destination);
    const t = actx.currentTime + i*0.08;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.14, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.4);
    o.start(t); o.stop(t + 0.42);
  });
}

// ───────────────────────── resize & render loop ────────────────────────
function resize(){
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
const clock = new THREE.Clock();
let started = false;

function frame(){
  const dt = Math.min(clock.getDelta(), 0.05);
  const tNow = clock.elapsedTime;

  if (reduceMotion){
    if (!bootDone){
      bootDone = true;
      logo.scale.setScalar(HERO_SCALE); uiTarget = 1; uiAlpha = 1; applyUI();
    }
    updateInteractive(dt);
  } else if (!bootDone){
    updateBoot(dt);
  } else {
    updateInteractive(dt);
  }

  if (Math.abs(uiTarget - uiAlpha) > 0.001){ uiAlpha += (uiTarget - uiAlpha) * 0.08; applyUI(); }

  spark.position.set(Math.cos(tNow*0.6)*6.0, 3.4 + Math.sin(tNow*0.9)*1.2, Math.sin(tNow*0.6)*6.0 - 2.0);

  camera.position.copy(CAM_BASE).sub(CAM_TARGET).multiplyScalar(camZoom).add(CAM_TARGET);
  camera.lookAt(CAM_TARGET);

  renderer.render(scene, camera);

  if (!started){ started = true; document.getElementById('load').classList.add('hide'); }
  requestAnimationFrame(frame);
}

resetBoot();
const DEBUG_STILL = true;   // TEMP
if (DEBUG_STILL){
  bootDone = true;
  logo.scale.setScalar(HERO_SCALE);
  logo.position.set(0, HERO_Y, 0);
  yaw = userYaw = 0; pitch = userPitch = 0;
  applyQuat(0, 0);
  uiTarget = uiAlpha = 1; applyUI();
}
frame();
</script>
</body>
</html>
